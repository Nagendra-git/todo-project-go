version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: todo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    container_name: todo-api
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      - mongo

volumes:
  mongo-data:
